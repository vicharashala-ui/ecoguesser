name: D1 Monthly Cleanup
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete scores older than 90 days
        # '+5 hours','+30 minutes' shifts UTC 'now' to IST -- the 'date' column is
        # always an IST date string (see todayIST() in handlers.js); comparing
        # against raw UTC would drift the cutoff by up to 5.5h at the day boundary.
        run: |
          npx wrangler d1 execute ecoguesser \
            --command "DELETE FROM scores WHERE date < date('now', '+5 hours', '+30 minutes', '-90 days')" \
            --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
